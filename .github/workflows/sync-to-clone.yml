name: Sync to Clone

# Trigger on pushes to main that touch ABAP objects or gCTS metadata.
# Also supports manual trigger for initial population / full re-sync.
on:
  push:
    branches: [main]
    paths:
      - 'objects/**'
      - '.gctsmetadata/**'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Run full conversion of all objects (not just changed)'
        required: false
        default: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest

    # Skip if this push was made by the sync bot (prevents infinite loops)
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 2

      - name: Checkout clone repo
        uses: actions/checkout@v4
        with:
          repository: austinkloske22/unified-sap-addon-clone
          token: ${{ secrets.SYNC_PAT }}
          path: clone
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Convert gCTS objects to abapGit format
        run: |
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"

          if [ "$IS_MANUAL" = "true" ]; then
            echo "Manual trigger — full conversion of all objects"
          else
            # Check if anything actually changed
            cd source
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- objects/ .gctsmetadata/ || true)
            cd ..

            if [ -z "$CHANGED" ]; then
              echo "No object changes detected"
              exit 0
            fi

            echo "Changed files:"
            echo "$CHANGED"
          fi

          # Convert all objects using abapgit-cli
          mkdir -p clone/src
          npx abapgit-cli@latest convert \
            --from gcts --to abapgit \
            -i source/objects \
            -o clone/src \
            -v

      - name: Handle deleted objects (incremental sync only)
        if: github.event_name == 'push'
        run: |
          cd source
          DELETED=$(git diff --name-only --diff-filter=D HEAD~1 HEAD -- objects/ || true)
          cd ..

          if [ -n "$DELETED" ]; then
            echo "Deleted objects detected:"
            echo "$DELETED"
            for gcts_path in $DELETED; do
              obj_dir=$(echo "$gcts_path" | cut -d'/' -f3)
              obj_name=$(echo "$obj_dir" | python3 -c "import sys,urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))")
              abapgit_base=$(echo "$obj_name" | sed 's|/|#|g' | tr '[:upper:]' '[:lower:]')
              find clone/src/ -name "${abapgit_base}.*" -delete 2>/dev/null || true
              echo "  Removed ${abapgit_base}.* from clone"
            done
          fi

      - name: Commit and push to clone
        run: |
          cd clone
          git config user.name "gcts-sync-bot"
          git config user.email "gcts-sync-bot@contax.com"
          git add -A src/

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          SOURCE_MSG=$(cd ../source && git log -1 --format='%s')
          git commit -m "[SYNC] ${SOURCE_MSG}"

          git push || (git pull --rebase && git push)
