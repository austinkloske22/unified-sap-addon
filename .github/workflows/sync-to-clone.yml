name: Sync to Clone

# Trigger on pushes to main that touch ABAP objects or gCTS metadata.
# Also supports manual trigger for initial population / full re-sync.
on:
  push:
    branches: [main]
    paths:
      - 'objects/**'
      - '.gctsmetadata/**'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Run full sync of all objects'
        required: false
        default: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest

    # Skip if this push was made by the sync bot (prevents infinite loops)
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 2

      - name: Checkout clone repo
        uses: actions/checkout@v4
        with:
          repository: austinkloske22/unified-sap-addon-btp
          token: ${{ secrets.SYNC_PAT }}
          path: clone
          fetch-depth: 1

      - name: Check for changes
        id: changes
        run: |
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"

          if [ "$IS_MANUAL" = "true" ]; then
            echo "Manual trigger — full sync of all objects"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            cd source
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- objects/ .gctsmetadata/ || true)
            cd ..

            if [ -z "$CHANGED" ]; then
              echo "No object changes detected"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "Changed files:"
              echo "$CHANGED"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Sync objects to clone repo
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # Copy objects/ directly — D10 and BTP use identical gCTS schemas
          # (confirmed by comparing zevent-ref-btp nametabs with D10 nametabs)
          # No field stripping needed — the schemas are identical (55 fields DD02L)
          rsync -av --delete source/objects/ clone/objects/

          # Sync nametabs additively (preserve BTP-specific files like ATO_E07)
          rsync -av source/.gctsmetadata/nametabs/ clone/.gctsmetadata/nametabs/

          # Sync objecttypes additively
          mkdir -p clone/.gctsmetadata/objecttypes/
          rsync -av source/.gctsmetadata/objecttypes/ clone/.gctsmetadata/objecttypes/

          # Remove old abapGit-format src/ directory if it exists (legacy cleanup)
          rm -rf clone/src

          # NEVER touch .gcts.properties.json (BTP identity)
          echo ".gcts.properties.json preserved"

      - name: Handle deleted objects (incremental sync only)
        if: github.event_name == 'push' && steps.changes.outputs.has_changes == 'true'
        run: |
          cd source
          DELETED_DIRS=$(git diff --name-only --diff-filter=D HEAD~1 HEAD -- objects/ \
            | sed -n 's|^objects/\([^/]*/[^/]*\)/.*|\1|p' | sort -u || true)
          cd ..

          if [ -n "$DELETED_DIRS" ]; then
            echo "Deleted object directories:"
            for obj_path in $DELETED_DIRS; do
              echo "  Removing clone/objects/${obj_path}"
              rm -rf "clone/objects/${obj_path}" 2>/dev/null || true
            done
          fi

      - name: Commit and push to clone
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd clone
          git config user.name "gcts-sync-bot"
          git config user.email "gcts-sync-bot@contax.com"
          git add -A objects/ .gctsmetadata/

          # Also stage removal of old src/ if it existed
          git add -A src/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          SOURCE_MSG=$(cd ../source && git log -1 --format='%s')
          git commit -m "[SYNC] ${SOURCE_MSG}"

          # Normal push only — NEVER force push (breaks BTP software component)
          git push
