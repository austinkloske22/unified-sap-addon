name: Sync to Clone

# Trigger on pushes to main that touch ABAP objects or gCTS metadata.
# This covers gCTS transport releases from the D10 system.
on:
  push:
    branches: [main]
    paths:
      - 'objects/**'
      - '.gctsmetadata/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    # Skip if this push was made by the sync bot (prevents infinite loops)
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 2  # need parent commit for diff-based sync

      - name: Checkout clone repo
        uses: actions/checkout@v4
        with:
          repository: austinkloske22/unified-sap-addon-clone
          token: ${{ secrets.SYNC_PAT }}
          path: clone
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Convert gCTS objects to abapGit format
        run: |
          # Determine what changed in this push
          cd source
          CHANGED_TYPES=$(git diff --name-only HEAD~1 HEAD -- objects/ | \
            sed -n 's|^objects/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ',' | sed 's/,$//')
          cd ..

          if [ -z "$CHANGED_TYPES" ]; then
            echo "No object type changes detected"
            exit 0
          fi

          echo "Changed object types: $CHANGED_TYPES"

          # Convert ALL objects using abapgit-cli (produces portable format)
          # The clone repo gets the full converted set — abapgit-cli strips
          # system-specific fields that would break BTP import
          npx abapgit-cli@latest convert \
            --from gcts --to abapgit \
            -i source/objects \
            -o clone/src \
            -v

      - name: Check for deleted objects
        run: |
          cd source
          # Find objects deleted in this push
          DELETED=$(git diff --name-only --diff-filter=D HEAD~1 HEAD -- objects/ || true)
          cd ..

          if [ -n "$DELETED" ]; then
            echo "Deleted objects detected:"
            echo "$DELETED"
            # Map deleted gCTS paths to abapGit filenames and remove them
            for gcts_path in $DELETED; do
              # Extract type and name from path: objects/TABL/%2FCOSS%2FEVENT/...
              obj_type=$(echo "$gcts_path" | cut -d'/' -f2)
              obj_dir=$(echo "$gcts_path" | cut -d'/' -f3)
              # Decode %2F to / then convert to abapgit # format
              obj_name=$(echo "$obj_dir" | python3 -c "import sys,urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))")
              abapgit_base=$(echo "$obj_name" | sed 's|/|#|g' | tr '[:upper:]' '[:lower:]')
              # Remove all files matching this object in clone/src/
              find clone/src/ -name "${abapgit_base}.*" -delete 2>/dev/null || true
              echo "  Removed ${abapgit_base}.* from clone"
            done
          fi

      - name: Commit and push to clone
        run: |
          cd clone
          git config user.name "gcts-sync-bot"
          git config user.email "gcts-sync-bot@contax.com"
          git add -A src/

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          # Preserve the original commit message from the source push
          SOURCE_MSG=$(cd ../source && git log -1 --format='%s')
          git commit -m "[SYNC] ${SOURCE_MSG}"

          # Retry push with pull-rebase in case of concurrent updates
          git push || (git pull --rebase && git push)
